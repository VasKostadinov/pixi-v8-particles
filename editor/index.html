<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pixi-v8-particles · editor</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">pixi-v8-particles · editor</div>
        <div class="actions">
          <button data-action="reset" class="ghost">Reset</button>
          <button data-action="import">Import</button>
          <button data-action="copy" class="primary">Copy JSON</button>
          <button data-action="download">Download</button>
        </div>
      </header>
      <main id="workspace">
        <section id="preview">
          <div id="preview-canvas"></div>
          <button id="follow-mouse" type="button" title="Follow mouse (preview only)">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.4" />
              <line x1="8" y1="1" x2="8" y2="4" stroke="currentColor" stroke-width="1.4" />
              <line x1="8" y1="12" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" />
              <line x1="1" y1="8" x2="4" y2="8" stroke="currentColor" stroke-width="1.4" />
              <line x1="12" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
          <label id="bg-picker" title="Preview background color">
            <input type="color" />
          </label>
          <div id="preview-hud">
            <span id="fps">—</span>
            <span class="dim">·</span>
            <span id="particle-count">0 particles</span>
          </div>
        </section>
        <div id="splitter" title="Drag to resize"></div>
        <aside id="panel">
          <div id="panel-scroll"></div>
        </aside>
      </main>
      <div id="toast"></div>
      <dialog id="import-dialog">
        <form method="dialog" class="import-form">
          <div class="import-head">
            <h2>Import emitter config</h2>
            <button type="button" class="import-close" data-action="close" aria-label="Close">
              ×
            </button>
          </div>
          <p class="import-hint">
            Paste an EmitterConfigV3 JSON below, or load a <code>.json</code> file.
          </p>
          <label class="import-file">
            <span>Load file…</span>
            <input type="file" accept="application/json,.json" data-action="file" />
          </label>
          <textarea
            data-action="text"
            class="import-textarea"
            spellcheck="false"
            placeholder='{ "lifetime": { "min": 1, "max": 2 }, "frequency": 0.01, "pos": { "x": 0, "y": 0 }, "behaviors": [ ... ] }'
          ></textarea>
          <div class="import-error" data-action="error" hidden></div>
          <div class="import-actions">
            <button type="button" class="ghost" data-action="cancel">Cancel</button>
            <button type="button" class="primary" data-action="apply">Import</button>
          </div>
        </form>
      </dialog>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
