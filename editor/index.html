<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pixi-v8-particles · editor</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">pixi-v8-particles · editor</div>
        <div class="actions">
          <button data-action="undo" class="ghost" title="Undo (Ctrl+Z)" disabled>Undo</button>
          <button data-action="redo" class="ghost" title="Redo (Ctrl+Shift+Z)" disabled>
            Redo
          </button>
          <div class="preset-wrap">
            <button id="preset-btn" type="button" class="ghost" title="Load a preset">
              Preset <span class="preset-chev" aria-hidden="true">▾</span>
            </button>
            <div id="preset-popover" class="preset-popover" hidden></div>
          </div>
          <button data-action="import">Import</button>
          <button data-action="copy" class="primary">Copy JSON</button>
          <button data-action="download">Download</button>
        </div>
      </header>
      <main id="workspace">
        <section id="preview">
          <div id="preview-canvas"></div>
          <button id="follow-mouse" type="button" title="Follow mouse (preview only)">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.4" />
              <line x1="8" y1="1" x2="8" y2="4" stroke="currentColor" stroke-width="1.4" />
              <line x1="8" y1="12" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" />
              <line x1="1" y1="8" x2="4" y2="8" stroke="currentColor" stroke-width="1.4" />
              <line x1="12" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.4" />
            </svg>
          </button>
          <button id="bg-mode" type="button" data-mode="solid" title="Background style">
            <span class="bg-mode-swatch" aria-hidden="true"></span>
            <svg
              class="bg-mode-icon bg-mode-icon-checker"
              viewBox="0 0 16 16"
              width="14"
              height="14"
              aria-hidden="true"
            >
              <rect x="0" y="0" width="8" height="8" fill="currentColor" opacity="0.85" />
              <rect x="8" y="8" width="8" height="8" fill="currentColor" opacity="0.85" />
              <rect x="8" y="0" width="8" height="8" fill="currentColor" opacity="0.25" />
              <rect x="0" y="8" width="8" height="8" fill="currentColor" opacity="0.25" />
            </svg>
            <svg
              class="bg-mode-icon bg-mode-icon-grid"
              viewBox="0 0 16 16"
              width="14"
              height="14"
              aria-hidden="true"
            >
              <path
                d="M0 5h16M0 10h16M5 0v16M10 0v16"
                stroke="currentColor"
                stroke-width="1.2"
                fill="none"
              />
            </svg>
          </button>
          <div id="bg-mode-popover" class="bg-mode-popover" hidden>
            <button type="button" class="bg-mode-row" data-mode="solid">
              <span class="bg-mode-dot" aria-hidden="true"></span>
              <span class="bg-mode-label">Solid</span>
              <label class="bg-mode-color" title="Preview background color">
                <span class="bg-mode-color-swatch" aria-hidden="true"></span>
                <input type="color" />
              </label>
            </button>
            <button type="button" class="bg-mode-row" data-mode="checker">
              <span class="bg-mode-dot" aria-hidden="true"></span>
              <span class="bg-mode-label">Checker</span>
              <span class="bg-mode-preview bg-mode-preview-checker" aria-hidden="true"></span>
            </button>
            <button type="button" class="bg-mode-row" data-mode="grid">
              <span class="bg-mode-dot" aria-hidden="true"></span>
              <span class="bg-mode-label">Grid</span>
              <span class="bg-mode-preview bg-mode-preview-grid" aria-hidden="true"></span>
            </button>
          </div>
          <div id="preview-hud">
            <span id="fps">—</span>
            <span class="dim">·</span>

            <span
              id="time-scale"
              title="Playback speed — ↑ reset to 1× · → faster · ← slower · ↓ freeze (click to reset)"
              >1×</span
            >
            <span class="dim">·</span>
            <span id="particle-count">0 particles</span>
          </div>
        </section>
        <div id="splitter" title="Drag to resize"></div>
        <aside id="panel">
          <div id="panel-scroll"></div>
        </aside>
      </main>
      <div id="toast"></div>
      <dialog id="import-dialog">
        <form method="dialog" class="import-form">
          <div class="import-head">
            <h2>Import emitter config</h2>
            <button type="button" class="import-close" data-action="close" aria-label="Close">
              ×
            </button>
          </div>
          <p class="import-hint">
            Paste an EmitterConfigV3 JSON below, or load a <code>.json</code> file.
          </p>
          <label class="import-file">
            <span>Load file…</span>
            <input type="file" accept="application/json,.json" data-action="file" />
          </label>
          <textarea
            data-action="text"
            class="import-textarea"
            spellcheck="false"
            placeholder='{ "lifetime": { "min": 1, "max": 2 }, "frequency": 0.01, "pos": { "x": 0, "y": 0 }, "behaviors": [ ... ] }'
          ></textarea>
          <div class="import-error" data-action="error" hidden></div>
          <div class="import-actions">
            <button type="button" class="ghost" data-action="cancel">Cancel</button>
            <button type="button" class="primary" data-action="apply">Import</button>
          </div>
        </form>
      </dialog>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
